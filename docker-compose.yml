services:

  db:
    image: postgres:16-alpine
    container_name: jobboard_db
    environment:
      POSTGRES_DB: jobboard_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5433:5432"
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U postgres" ]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - jobboard_network
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: jobboard_redis
    ports:
      - "6380:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: [ "CMD", "redis-cli", "ping" ]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - jobboard_network
    restart: unless-stopped

  backend:
    build: .
    container_name: jobboard_backend
    command: >
      sh -c "python manage.py migrate --noinput &&
             python manage.py collectstatic --noinput &&
             daphne -b 0.0.0.0 -p 8000 config.asgi:application"
    volumes:
      - .:/app
      - media_volume:/app/media
      - static_volume:/app/static
    ports:
      - "8001:8000"
    environment:
      DEBUG: ${DEBUG}
      DB_NAME: jobboard_db
      DB_USER: postgres
      DB_PASSWORD: postgres
      DB_HOST: db
      DB_PORT: 5432
      REDIS_URL: redis://redis:6379/0
      SECRET_KEY: ${SECRET_KEY}
      ALLOWED_HOSTS: localhost,127.0.0.1,backend
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - jobboard_network
    restart: unless-stopped

  celery-worker:
    build: .
    container_name: jobboard_celery_worker
    command: celery -A config worker -l info -n worker@%h
    volumes:
      - .:/app
    environment:
      DATABASE_URL: postgresql://postgres:postgres@db:5432/jobboard_db
      REDIS_URL: redis://redis:6379/0
    depends_on:
      - db
      - redis
      - backend
    networks:
      - jobboard_network
    restart: unless-stopped

volumes:
  postgres_data:
  redis_data:
  media_volume:
  static_volume:

networks:
  jobboard_network:
    driver: bridge
